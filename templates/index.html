<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digit Recognizer</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Handwritten Digit Recognizer</h1>
        <p>Draw a digit (0-9) inside the box below:</p>

        <div class="canvas-container">
            <canvas id="canvas" width="280" height="280"></canvas>
        </div>

        <div class="buttons">
            <button id="clear-btn">Clear Canvas</button>
            <button id="predict-btn">Predict Digit</button>
        </div>

        <div id="result-box" class="result-box">
            <h2>Prediction: <span id="prediction">-</span></h2>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;

        // Initialize canvas with a black background (matching MNIST format)
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Drawing settings
        ctx.strokeStyle = "white";
        ctx.lineWidth = 18;
        ctx.lineCap = "round";
        ctx.lineJoin = "round";

        // Canvas Mouse Events
        canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', () => { isDrawing = false; ctx.beginPath(); });
        canvas.addEventListener('mouseleave', () => { isDrawing = false; ctx.beginPath(); });

        // Touch support for mobile browsers
        canvas.addEventListener('touchstart', (e) => { isDrawing = true; draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchmove', (e) => { draw(e.touches[0]); e.preventDefault(); });
        canvas.addEventListener('touchend', () => { isDrawing = false; ctx.beginPath(); });

        function draw(e) {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            ctx.lineTo(x, y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        // Clear button
        document.getElementById('clear-btn').addEventListener('click', () => {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            document.getElementById('prediction').innerText = "-";
        });

        // Predict button
        document.getElementById('predict-btn').addEventListener('click', () => {
            const imageData = canvas.toDataURL('image/png');

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ image: imageData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.prediction !== undefined) {
                    document.getElementById('prediction').innerText = data.prediction;
                } else if (data.error) {
                    alert('Error: ' + data.error);
                }
            })
            .catch(err => console.error('Error:', err));
        });
    </script>
</body>
</html>
